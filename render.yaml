services:
  - type: web
    name: aaron-billing-software
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aaron-billing-db
          property: connectionString

databases:
  - name: aaron-billing-db
    databaseName: aaron_billing
    user: aaron_admin
    plan: free
