{% extends 'base.html' %}

{% load static %}

{% block extra_css %}
<style>
    /* Fullscreen Wrapper covering base.html defaults */
    .login-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0b0f19;
        background-image: url("{% static 'images/backgroudlogin.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999; /* Higher than navbars to ensure clean full screen layout */
        font-family: 'Inter', sans-serif;
    }
    
    .login-wrapper::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(11, 15, 25, 0.4) 0%, rgba(11, 15, 25, 0.75) 100%);
        z-index: 1;
    }
    
    .login-container-inner {
        position: relative;
        z-index: 2;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .login-card {
        background: rgba(255, 255, 255, 0.03) !important;
        backdrop-filter: blur(16px) saturate(120%);
        -webkit-backdrop-filter: blur(16px) saturate(120%);
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: 1.5rem !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
        padding: 2.5rem !important;
        width: 100%;
        max-width: 420px;
    }
    
    .login-title {
        color: #f8fafc !important;
        font-weight: 700;
        letter-spacing: -0.025em;
    }
    
    .login-subtitle {
        color: #94a3b8 !important;
        font-size: 0.85rem;
    }
    
    .form-label {
        color: #cbd5e1 !important;
        font-weight: 500;
        font-size: 0.8rem;
        letter-spacing: 0.01em;
    }
    
    /* Input Group & Controls Styling */
    .input-group-text {
        background: rgba(255, 255, 255, 0.04) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #64748b !important;
        transition: border-color 0.2s ease, color 0.2s ease;
    }
    
    .form-control {
        background: rgba(255, 255, 255, 0.04) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #f8fafc !important;
        font-size: 0.88rem !important;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }
    
    .form-control::placeholder {
        color: #475569 !important;
    }
    
    .form-control:focus {
        background: rgba(255, 255, 255, 0.07) !important;
        color: #ffffff !important;
        box-shadow: none !important;
    }
    
    .btn-toggle-password {
        background: rgba(255, 255, 255, 0.04) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #64748b !important;
        transition: border-color 0.2s ease, color 0.2s ease;
    }
    
    .btn-toggle-password:hover {
        color: #cbd5e1 !important;
        background: rgba(255, 255, 255, 0.06) !important;
    }
    
    /* Focus State Sync */
    .input-group:focus-within .input-group-text,
    .input-group:focus-within .form-control,
    .input-group:focus-within .btn {
        border-color: rgba(99, 102, 241, 0.5) !important;
    }
    
    .input-group:focus-within .input-group-text {
        color: #818cf8 !important;
    }
    
    /* Submit Button styling */
    .login-btn {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
        border: none !important;
        border-radius: 0.75rem !important;
        color: #ffffff !important;
        font-weight: 600 !important;
        font-size: 0.95rem !important;
        padding: 0.75rem !important;
        transition: all 0.2s ease !important;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3) !important;
    }
    
    .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4) !important;
        filter: brightness(110%);
    }
    
    .login-btn:active {
        transform: translateY(1px);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container-inner px-3">
        <div class="card login-card">
            <div class="text-center mb-4">
                <img src="{% static 'images/aronlogonow.png' %}" alt="Aaron Billing" class="mb-3 animate-fade-in" style="max-width: 120px; height: auto;"/>
                <h4 class="login-title mb-1">Welcome Back</h4>
                <p class="login-subtitle">Sign in to your account to continue</p>
            </div>
            
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                {% if form.non_field_errors %}
                <div class="alert alert-danger p-2.5 small mb-4 rounded-3 text-center" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5;">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i> {{ form.non_field_errors.0 }}
                </div>
                {% endif %}
                
                <!-- Username or Employee ID -->
                <div class="mb-3">
                    <label for="id_username" class="form-label mb-2">Username or Employee ID</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 rounded-start-3"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control border-start-0 rounded-end-3 py-2.5" id="id_username" placeholder="Enter username or Employee ID" required>
                    </div>
                </div>
                
                <!-- Password -->
                <div class="mb-4">
                    <label for="id_password" class="form-label mb-2">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0 rounded-start-3"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 border-end-0 py-2.5" id="id_password" placeholder="Enter password" required>
                        <button class="btn btn-toggle-password border-start-0 rounded-end-3" type="button" id="togglePassword">
                            <i class="bi bi-eye" id="passwordEyeIcon"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 login-btn py-2.5 mt-2">Sign In</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordInput = document.getElementById('id_password');
        const eyeIcon = document.getElementById('passwordEyeIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        }
    });
</script>
{% endblock %}
