{% extends 'base.html' %}

{% block title %}Product Stock In - Aaron Billing{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card border-0 shadow-sm p-4 h-100 bg-white">
            <h5 class="fw-bold mb-1 text-primary">Product Stock In</h5>
            <p class="text-muted small mb-4">{{ inventory.product.name }} (Current: <span class="fw-bold text-dark">{{ inventory.stock_quantity }}</span>)</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">Quantity to Add</label>
                    <input type="number" name="add_quantity" class="form-control rounded-pill border-0 bg-light" placeholder="e.g. 50" min="1" required autofocus>
                    <div class="form-text x-small text-muted">Existing stock will be increased by this amount.</div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex mt-4">
                    <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 flex-grow-1 fw-bold shadow-sm">
                        <i class="bi bi-plus-circle me-1"></i> Confirm Add
                    </button>
                    <a href="{% url 'manager_inventory_list' %}" class="btn btn-light rounded-pill px-4 py-2">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
