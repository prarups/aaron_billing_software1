{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block branding %}
<div id="site-name" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
    <h1 style="margin: 0;"><a href="{% url 'admin:index' %}">{{ site_header|default:_('Django administration') }}</a></h1>
    <a href="{% url 'dashboard' %}" style="margin-right: 20px; font-size: 13px; background: rgba(255, 255, 255, 0.2); padding: 5px 15px; border-radius: 4px; color: white; text-decoration: none; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.5);">Back to Dashboard</a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
