{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block branding %}
<div id="site-name" style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
    <h1 style="margin: 0; line-height: 1.2;"><a href="{% url 'admin:index' %}">{{ site_header|default:_('Django administration') }}</a></h1>
    <a href="{% url 'dashboard' %}" style="font-size: 12px; background: rgba(255, 255, 255, 0.15); padding: 4px 12px; border-radius: 4px; color: white; text-decoration: none; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3); white-space: nowrap;">Back to Dashboard</a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
